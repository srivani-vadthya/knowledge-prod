services:
  - type: web
    name: knowledge-assistant-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install fastapi uvicorn
    startCommand: uvicorn test_api:app --host 0.0.0.0 --port $PORT --log-level info
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: knowledge-assistant-web
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ADMIN_CODE
        sync: false
      - key: VITE_USER_CODE
        sync: false

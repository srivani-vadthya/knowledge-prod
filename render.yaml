services:
  - type: web
    name: knowledge-assistant-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: SERVICENOW_INSTANCE
        sync: false
      - key: SERVICENOW_USERNAME
        sync: false
      - key: SERVICENOW_PASSWORD
        sync: false
      - key: ENABLE_IMAGE_PROCESSING
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: knowledge-assistant-web
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ADMIN_CODE
        sync: false
      - key: VITE_USER_CODE
        sync: false

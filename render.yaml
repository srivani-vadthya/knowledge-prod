services:
  - type: web
    name: knowledge-assistant-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker api:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health

  - type: web
    name: knowledge-assistant-web
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ADMIN_CODE
        sync: false
      - key: VITE_USER_CODE
        sync: false

  - type: web
    name: knowledge-assistant-web
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ADMIN_CODE
        sync: false
      - key: VITE_USER_CODE
        sync: false

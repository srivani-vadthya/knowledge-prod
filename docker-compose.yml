services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-assistant-api
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./uploads:/app/uploads
      - ./indexed_docs.json:/app/indexed_docs.json
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: knowledge-assistant-ui
    depends_on:
      - api
    ports:
      - "4173:4173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    restart: unless-stopped

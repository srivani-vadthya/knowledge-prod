services:
  api:
    build:
      context: ./knowledge-agent
      dockerfile: Dockerfile
    container_name: knowledge-assistant-api
    ports:
      - "8000:8000"
    env_file:
      - ./knowledge-agent/.env
    volumes:
      - ./knowledge-agent/uploads:/app/uploads
      - ./knowledge-agent/indexed_docs.json:/app/indexed_docs.json
    restart: unless-stopped

  ui:
    build:
      context: ./knowledge-agent
      dockerfile: Dockerfile.streamlit
    container_name: knowledge-assistant-ui
    depends_on:
      - api
    ports:
      - "8501:8501"
    env_file:
      - ./knowledge-agent/.env
    volumes:
      - ./knowledge-agent/uploads:/app/uploads
      - ./knowledge-agent/indexed_docs.json:/app/indexed_docs.json
    restart: unless-stopped
